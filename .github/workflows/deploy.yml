name: CD - Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
              # Try to find the fleetflow directory if ~/fleetflow doesn't exist
              if [ ! -d "~/fleetflow" ]; then
                echo "Directory ~/fleetflow not found. Checking current directory..."
                if [ -f "deploy.sh" ]; then
                  echo "Found deploy.sh in $(pwd). Continuing..."
                else
                   echo "Error: deploy.sh not found in ~/fleetflow or current directory."
                   ls -la
                   exit 1
                fi
              else
                cd ~/fleetflow
              fi
              bash deploy.sh
