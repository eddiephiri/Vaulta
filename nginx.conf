server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide Nginx version from response headers
    server_tokens off;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com; img-src 'self' data:; font-src 'self';" always;

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # All routes (React Router paths) fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite hashes asset filenames — safe to cache aggressively
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|webp|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── PWA service worker — must NOT be cached ───────────────────────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;
}
