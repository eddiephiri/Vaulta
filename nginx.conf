server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide Nginx version from response headers
    server_tokens off;

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # All routes (React Router paths) fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite hashes asset filenames — safe to cache aggressively
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|webp|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── PWA service worker — must NOT be cached ───────────────────────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;
}
